<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Private Canal Cruises — Presentatie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#16263f;--green-deep:#101b2e;--cream:#f3efe4;--cream-soft:#e9e3d3;
  --gold:#b08d4f;--gold-light:#c9aa6e;--ink:#1a2740;
  --muted:rgba(243,239,228,0.62);--line:rgba(243,239,228,0.18);
  --display:"Cormorant Garamond",Georgia,serif;--body:"Jost","Helvetica Neue",Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:#0a1220}
body{font-family:var(--body);color:var(--cream);-webkit-font-smoothing:antialiased;font-weight:300}
#deck{height:100dvh;width:100vw;position:relative}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .9s ease;background:var(--green);padding:clamp(26px,4.6vw,80px);justify-content:center}
.slide.active{opacity:1;visibility:visible;z-index:2}
.slide.bg-cover{background-size:cover;background-position:center;padding:0;justify-content:flex-end}
.slide .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,18,32,.25) 0%,rgba(10,18,32,.12) 38%,rgba(10,18,32,.82) 100%);z-index:1}
.slide .inner{position:relative;z-index:2;width:100%}
.slide.active .reveal{animation:rise 1s cubic-bezier(.2,.7,.2,1) both}
.slide.active .reveal:nth-child(2){animation-delay:.1s}
.slide.active .reveal:nth-child(3){animation-delay:.2s}
.slide.active .reveal:nth-child(4){animation-delay:.3s}
.slide.active .reveal:nth-child(5){animation-delay:.4s}
.slide.active .reveal:nth-child(6){animation-delay:.5s}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.slide.active .reveal{animation:none}}
.eyebrow{font-family:var(--body);font-weight:400;letter-spacing:.42em;text-transform:uppercase;font-size:clamp(9px,1vw,12px);color:var(--gold-light)}
h1,h2{font-family:var(--display);font-weight:500;line-height:1.02;letter-spacing:.005em}
h1{font-size:clamp(40px,8.5vw,128px)}
h2{font-size:clamp(28px,5vw,68px)}
p.body{font-size:clamp(13px,1.2vw,18px);line-height:1.7;color:var(--muted);max-width:50ch;font-weight:300}
.rule{width:54px;height:1px;background:var(--gold);margin:0 0 24px}
.cover{background:var(--green-deep);justify-content:center;align-items:center;text-align:center}
.cover-bg{position:absolute;inset:0;background-size:cover;z-index:0}
.cover-bg-portrait{display:none}
@media (max-width:860px) and (orientation:portrait){.cover-bg-landscape{display:none}.cover-bg-portrait{display:block}}
.rotate-prompt{display:none;position:fixed;inset:0;z-index:9999;background:var(--green-deep);flex-direction:column;justify-content:center;align-items:center;text-align:center;color:var(--cream);font-family:var(--body)}
.rotate-prompt svg{width:60px;height:60px;fill:var(--gold);margin-bottom:20px;animation:rotate-hint 2s ease-in-out infinite}
.rotate-prompt p{font-size:16px;color:var(--muted)}
@keyframes rotate-hint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-90deg)}}
@media (max-width:860px) and (orientation:landscape){.rotate-prompt{display:flex}}
.cover .gallery{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr 1fr;z-index:0}
.cover .gallery div{background-size:cover;background-position:center;filter:saturate(.9) brightness(.6)}
.cover .gallery::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(16,38,63,.5) 0%,rgba(10,18,32,.92) 100%)}
.cover .inner{z-index:3;transform:translateY(-8vh)}
.cover .star{font-size:clamp(13px,1.5vw,19px);letter-spacing:.5em;color:var(--gold);margin-bottom:24px}
.cover h1{font-size:clamp(46px,10vw,150px);font-weight:500}
.cover .sub{margin-top:20px;font-size:clamp(11px,1.1vw,15px);letter-spacing:.34em;text-transform:uppercase;color:var(--cream);font-weight:300}
.pano{justify-content:center;padding-top:clamp(78px,11vh,130px)}
.pano-grid{display:flex;flex-direction:column;gap:clamp(22px,3vw,40px);width:100%;max-width:1500px;margin:0 auto}
.pano-img{width:100%;height:clamp(200px,40vh,440px);background-size:cover;background-position:center 78%;border-radius:2px;box-shadow:0 30px 80px rgba(0,0,0,.42)}
.pano-copy{max-width:1000px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,4.5vw,76px);align-items:center;height:100%}
.media{height:78vh;border-radius:2px;background-size:cover;background-position:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.copy{display:flex;flex-direction:column;justify-content:center}
.boat-wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(26px,4vw,64px);align-items:center;height:100%}
.boat-hero{height:78vh;border-radius:2px;background-size:cover;background-position:center;box-shadow:0 30px 80px rgba(0,0,0,.42)}
.boat-copy{display:flex;flex-direction:column;justify-content:center}
.meta{display:flex;gap:clamp(18px,2.6vw,46px);margin:24px 0 22px;flex-wrap:wrap}
.meta .item .k{font-family:var(--display);font-size:clamp(24px,2.8vw,42px);color:var(--cream);line-height:1}
.meta .item .l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-light);margin-top:8px}
.feat{list-style:none;columns:2;column-gap:30px;max-width:540px}
.feat li{font-size:clamp(12px,1.05vw,15px);color:var(--muted);padding:6px 0 6px 16px;position:relative;break-inside:avoid}
.feat li::before{content:"";position:absolute;left:0;top:12px;width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg)}
.strip{display:flex;gap:12px;margin-top:24px}
.strip div{flex:1;height:clamp(110px,17vh,190px);background-size:cover;background-position:center;border-radius:2px;box-shadow:0 12px 30px rgba(0,0,0,.35)}
.usps{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,3vw,48px);margin-top:40px}
.usp{border-top:1px solid var(--line);padding-top:20px}
.usp .n{font-family:var(--display);font-size:clamp(26px,3vw,44px);color:var(--gold);line-height:1}
.usp h3{font-family:var(--display);font-weight:500;font-size:clamp(19px,1.9vw,27px);margin:12px 0 9px}
.usp p{font-size:clamp(12px,1vw,15px);line-height:1.62;color:var(--muted)}
.cul-grid{display:grid;grid-template-columns:1.1fr 0.9fr 0.9fr 1fr;grid-template-rows:1fr 1.1fr;gap:10px;height:60vh;margin-top:8px}
.cul-grid div{background-size:cover;background-position:center;border-radius:2px;box-shadow:0 16px 40px rgba(0,0,0,.34)}
.cul-grid .tall{grid-row:span 2}
.cul-grid .wide{grid-column:span 2}
.slide-pad{justify-content:flex-start;padding-top:clamp(78px,11vh,120px)}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(16px,2.4vw,40px);margin-top:42px}
.step .n{font-family:var(--display);font-size:clamp(32px,4vw,58px);color:var(--gold);line-height:1;opacity:.92}
.step h3{font-family:var(--display);font-weight:500;font-size:clamp(18px,1.7vw,24px);margin:12px 0 7px}
.step p{font-size:clamp(12px,1vw,14px);line-height:1.55;color:var(--muted)}
.close{justify-content:center}
.contact{display:flex;gap:clamp(32px,6vw,90px);margin-top:42px;flex-wrap:wrap}
.contact .item .l{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px}
.contact .item a,.contact .item span{font-family:var(--display);font-size:clamp(18px,1.9vw,28px);color:var(--cream);text-decoration:none}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:clamp(16px,2.2vw,28px) clamp(22px,4vw,58px);pointer-events:none}
.brandmark{font-family:var(--display);font-size:clamp(14px,1.4vw,19px);letter-spacing:.32em;text-transform:uppercase;color:var(--cream);opacity:.92;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.brandmark .s{color:var(--gold)}
.lang{pointer-events:auto;display:flex;gap:2px;align-items:center}
.lang button{background:none;border:none;color:var(--muted);font-family:var(--body);font-size:12px;letter-spacing:.18em;cursor:pointer;padding:6px 9px;transition:color .3s}
.lang button.on{color:var(--gold-light)}
.lang .sep{color:var(--line)}
.counter{position:fixed;bottom:clamp(18px,2.6vw,36px);left:clamp(22px,4vw,58px);z-index:30;font-family:var(--display);font-size:clamp(14px,1.3vw,18px);color:var(--muted);letter-spacing:.1em}
.counter .cur{color:var(--cream)}
.dots{position:fixed;bottom:clamp(18px,2.6vw,36px);left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:10px}
.dots button{width:7px;height:7px;border-radius:50%;border:1px solid var(--gold);background:transparent;padding:0;cursor:pointer;transition:all .35s}
.dots button.on{background:var(--gold);transform:scale(1.25)}
.arrows{position:fixed;bottom:clamp(16px,2.6vw,34px);right:clamp(22px,4vw,58px);z-index:30;display:flex;gap:12px}
.arrows button{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:rgba(243,239,228,.05);color:var(--cream);cursor:pointer;font-size:18px;transition:all .3s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.arrows button:hover{border-color:var(--gold);background:rgba(176,141,79,.16)}
.arrows button:disabled{opacity:.25;cursor:default}
.arrows button:focus-visible,.dots button:focus-visible,.lang button:focus-visible{outline:2px solid var(--gold-light);outline-offset:3px}
.hint{position:fixed;bottom:clamp(60px,8vw,90px);left:50%;transform:translateX(-50%);z-index:30;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);opacity:.7;transition:opacity .6s}
.hint.hide{opacity:0}
.dev-panel{position:fixed;top:50%;right:20px;transform:translateY(-50%);z-index:100;background:rgba(0,0,0,.92);border:1px solid var(--gold);border-radius:8px;padding:16px;width:280px;font-size:12px;display:none;backdrop-filter:blur(10px)}
.dev-panel.show{display:block}
.dev-panel h4{color:var(--gold);margin:0 0 12px;font-family:var(--body);font-weight:500;font-size:11px;letter-spacing:.15em;text-transform:uppercase}
.dev-panel label{display:block;color:var(--cream);margin:8px 0 4px;font-size:11px}
.dev-panel input[type="range"]{width:100%;accent-color:var(--gold)}
.dev-panel .val{color:var(--gold-light);font-family:monospace;font-size:10px}
.dev-panel .img-name{color:var(--muted);font-size:10px;margin-bottom:12px;word-break:break-all}
.dev-panel button{background:var(--gold);color:var(--green-deep);border:none;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:11px;margin-top:12px;width:100%}
.dev-panel button:hover{background:var(--gold-light)}
.dev-panel .targets{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
.dev-panel .target{padding:6px 8px;margin:4px 0;background:rgba(255,255,255,.05);border-radius:4px;cursor:pointer;color:var(--cream);font-size:10px}
.dev-panel .target:hover{background:rgba(255,255,255,.12)}
.dev-panel .target.active{border:1px solid var(--gold)}
/* Tablet landscape */
@media (max-width:1024px){
  .slide{padding:clamp(20px,3.5vw,50px)}
  .pano{padding-top:clamp(60px,9vh,100px)}
}
/* Tablet portrait */
@media (max-width:860px){
  .split,.boat-wrap{grid-template-columns:1fr;gap:16px}
  .media,.boat-hero{height:32vh;order:-1;margin-top:10px}
  .usps,.steps{grid-template-columns:1fr 1fr;gap:24px}
  .cover .gallery{grid-template-columns:1fr}
  .feat{columns:3;column-gap:20px}
  .feat li{font-size:11px;padding:4px 0 4px 14px}
  .pano-img{height:28vh}
  .pano{padding-top:clamp(80px,12vh,120px)}
  .pano-copy{padding-top:16px}
  .cul-grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);height:auto;gap:8px}
  .cul-grid .tall,.cul-grid .wide{grid-row:auto;grid-column:auto}
  .cul-grid div{height:18vh}
  .brandmark{font-size:11px;letter-spacing:.18em}
  .strip div{height:12vh}
  .strip{gap:6px}
  .slide[data-i="2"]{padding-top:clamp(80px,12vh,120px)}
  .slide[data-i="2"] .inner{padding-top:0}
  .slide[data-i="7"]{padding-top:clamp(70px,10vh,100px)}
  .slide[data-i="8"]{padding-top:clamp(70px,10vh,100px)}
  .slide[data-i="8"] h2{max-width:100%}
  .slide[data-i="9"] .copy{padding-top:20px}
  .slide[data-i="9"] h2{font-size:clamp(20px,4vw,28px)}
  .slide[data-i="10"]{justify-content:center;padding-bottom:clamp(60px,10vh,100px)}
  .slide[data-i="10"] .contact{margin-top:28px}
}
/* Tablet portrait orientation specific */
@media (max-width:860px) and (orientation:portrait){
  /* P2: Walter en Yuri foto - midden cirkel op onderkant hoofdfoto */
  .slide[data-i="1"] .owners-photo{transform:translateY(50%)!important}
  /* P3: tekstblok volle breedte in portrait, iets hoger */
  .slide[data-i="2"]{background-position:30% center!important}
  .slide[data-i="2"] .inner{max-width:none!important;padding-bottom:9vh!important}
  .slide[data-i="2"] .body{max-width:none!important}
  /* P4: vakken minder hoog, fotos vakvullend */
  .slide[data-i="3"] .inner{padding-top:50px}
  .slide[data-i="3"] .inner>div:last-child{display:flex;flex-direction:column;gap:10px}
  .slide[data-i="3"] .inner>div:last-child>div>div:first-child{height:18vh!important;background-size:cover!important}
  /* P5/6/7: tekstblok + fotos omhoog */
  .slide[data-i="4"],.slide[data-i="5"],.slide[data-i="6"]{padding-top:clamp(70px,10vh,100px)!important;justify-content:flex-start!important}
  .slide[data-i="4"] .boat-wrap,.slide[data-i="5"] .boat-wrap,.slide[data-i="6"] .boat-wrap{gap:0!important;align-content:flex-start}
  .slide[data-i="4"] .boat-hero,.slide[data-i="5"] .boat-hero,.slide[data-i="6"] .boat-hero{height:26vh!important;margin:0!important}
  .slide[data-i="4"] .boat-copy,.slide[data-i="5"] .boat-copy,.slide[data-i="6"] .boat-copy{margin-top:20px!important}
  .slide[data-i="4"] .boat-copy h2,.slide[data-i="5"] .boat-copy h2,.slide[data-i="6"] .boat-copy h2{font-size:clamp(28px,6vw,42px)!important;margin:6px 0 4px!important}
  .slide[data-i="4"] .boat-copy>div[style*="italic"],.slide[data-i="5"] .boat-copy>div[style*="italic"],.slide[data-i="6"] .boat-copy>div[style*="italic"]{margin-bottom:12px!important;font-size:clamp(14px,1.5vw,18px)!important}
  .slide[data-i="4"] .body,.slide[data-i="5"] .body,.slide[data-i="6"] .body{font-size:12px!important;line-height:1.5!important}
  .meta{margin:10px 0 8px!important}
  .meta .item .k{font-size:clamp(18px,4vw,28px)!important}
  .meta .item .l{font-size:8px!important;margin-top:4px!important}
  .strip{margin-top:14px!important}
  .strip div{height:11vh!important}
  .feat{margin:6px 0!important;columns:2!important;column-gap:14px!important}
  .feat li{padding:3px 0 3px 12px!important;font-size:10px!important}
  .feat li::before{top:7px!important;width:4px!important;height:4px!important}
  /* P10: titel op 2 regels, foto hoger */
  .slide[data-i="9"] h2{font-size:clamp(18px,4vw,26px);line-height:1.2;max-width:21ch!important}
  .slide[data-i="9"] .split{align-items:flex-start;padding-top:20px}
  .slide[data-i="9"] .copy{gap:0}
  .slide[data-i="9"] .rule{margin-bottom:12px!important}
  .slide[data-i="9"] .steps{margin-top:-4px!important}
  .slide[data-i="9"] .media{background-position:center 70%!important}
  .slide[data-i="10"] h2{font-size:clamp(18px,3.5vw,24px)}
  .slide[data-i="10"] .inner{margin-top:-8vh}
  .slide[data-i="10"] .contact{margin-top:20px;gap:20px}
  /* P11: verticaal centreren */
  .close .inner{display:flex;flex-direction:column;justify-content:center;min-height:70vh}
}
/* Phone landscape */
@media (max-width:860px) and (orientation:landscape){
  .media,.boat-hero{height:70vh}
  .pano-img{height:50vh}
  .cul-grid div{height:35vh}
  .strip div{height:20vh}
}
/* Phone portrait */
@media (max-width:560px){
  .usps,.steps{grid-template-columns:1fr}
  h1{font-size:clamp(32px,10vw,56px)}
  h2{font-size:clamp(24px,6vw,38px)}
  .cover img{max-width:85vw!important}
  .pano{padding-top:clamp(65px,12vh,100px)}
  .pano-img{height:25vh}
  .media,.boat-hero{height:32vh}
  .cul-grid{grid-template-columns:1fr 1fr;gap:6px}
  .cul-grid .tall{grid-row:span 1;grid-column:span 2}
  .cul-grid .wide{grid-column:span 2}
  .cul-grid div{height:16vh}
  .strip div{height:11vh}
  .meta{gap:12px}
  .meta .item .k{font-size:clamp(20px,5vw,28px)}
  .counter{left:16px;bottom:14px}
  .arrows{right:16px;bottom:12px;gap:8px}
  .arrows button{width:38px;height:38px;font-size:16px}
  .dots{bottom:14px;gap:6px}
  .dots button{width:6px;height:6px}
}
/* Small phone */
@media (max-width:380px){
  h1{font-size:28px}
  h2{font-size:22px}
  .slide{padding:16px}
  .pano-img{height:22vh}
  .cul-grid div{height:14vh}
}
/* TV / Large screens */
@media (min-width:1600px){
  .slide{padding:clamp(40px,5vw,100px)}
  .pano-img{height:clamp(300px,45vh,520px)}
  .media,.boat-hero{height:82vh}
  .strip div{height:clamp(140px,20vh,220px)}
  .cul-grid{height:65vh}
}
</style>
</head>
<body>
<div class="rotate-prompt" data-nl="Draai je apparaat naar portretmodus" data-en="Please rotate your device to portrait mode">
  <svg viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25-.77c-.59-.59-1.54-.59-2.12 0L1.75 8.11c-.59.59-.59 1.54 0 2.12l12.02 12.02c.59.59 1.54.59 2.12 0l6.36-6.36c.59-.59.59-1.54 0-2.12L10.23 1.75zm4.6 19.44L2.81 9.17l6.36-6.36 12.02 12.02-6.36 6.38zm-7.31.29C4.25 19.94 1.91 16.76 1.55 13H.05C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.33 1.32z"/></svg>
  <p data-nl="Draai je apparaat naar portretmodus" data-en="Please rotate your device to portrait mode">Draai je apparaat naar portretmodus</p>
</div>
<div class="topbar">
  <div class="brandmark">Private Canal Cruises <span class="s">★</span></div>
  <div class="lang" role="group" aria-label="Language">
    <button id="lang-nl" class="on" onclick="setLang('nl')">NL</button>
    <span class="sep">/</span>
    <button id="lang-en" onclick="setLang('en')">EN</button>
  </div>
</div>
<div id="deck"></div>
<div class="hint" id="hint" data-nl="Veeg of gebruik de pijlen" data-en="Swipe or use the arrows"></div>
<div class="counter"><span class="cur" id="cur">01</span> / <span id="total">11</span></div>
<div class="dots" id="dots"></div>
<div class="arrows">
  <button id="prev" onclick="go(idx-1)" aria-label="Vorige">‹</button>
  <button id="next" onclick="go(idx+1)" aria-label="Volgende">›</button>
</div>
<div class="dev-panel" id="devPanel">
  <h4>📷 Dev Panel (D = toggle)</h4>
  <div class="img-name" id="devImgName">-</div>
  <div class="targets" id="devTargets"></div>
  <label>Positie X: <span class="val" id="devPosXVal">50%</span></label>
  <input type="range" id="devPosX" min="0" max="100" value="50">
  <label>Positie Y: <span class="val" id="devPosYVal">50%</span></label>
  <input type="range" id="devPosY" min="0" max="100" value="50">
  <label>Zoom: <span class="val" id="devZoomVal">cover</span></label>
  <input type="range" id="devZoom" min="50" max="300" value="100">
  <button onclick="copyDevCSS()">📋 Kopieer CSS</button>
  <button onclick="copyAllCSS()" style="margin-top:6px">📋 COPY ALL</button>
</div>
<script>

function boatSlide(i,key,hero,cap,strip,heroPos="center",heroSize="cover"){
  const name=T[key+"_name"],year=T[key+"_year"];
  const fn=T[key+"_feat_nl"],fe=T[key+"_feat_en"];
  const li=fn.map((f,j)=>`<li data-nl="${fn[j]}" data-en="${fe[j]}">${fn[j]}</li>`).join("");
  const strips=strip.map(s=>typeof s==='string'?`<div style="background-image:url('${s}')"></div>`:`<div style="background-image:url('${s.url}');background-position:${s.pos||'center'};background-size:${s.size||'cover'}"></div>`).join("");
  return `<div class="slide" data-i="${i}"><div class="boat-wrap"><div class="boat-hero reveal" style="background-image:url('${hero}');background-position:${heroPos};background-size:${heroSize}"></div><div class="boat-copy"><div class="eyebrow reveal" data-nl="Salonboot · ${year}" data-en="Saloon boat · ${year}">Salonboot · ${year}</div><h2 class="reveal" style="font-size:clamp(42px,5.6vw,86px);margin:8px 0 4px">${name}</h2><div class="reveal" style="font-family:var(--display);font-style:italic;font-size:clamp(17px,1.8vw,25px);color:var(--gold-light);margin-bottom:18px" data-nl="${T[key+"_tag_nl"]}" data-en="${T[key+"_tag_en"]}">${T[key+"_tag_nl"]}</div><p class="body reveal" data-nl="${T[key+"_p_nl"]}" data-en="${T[key+"_p_en"]}">${T[key+"_p_nl"]}</p><div class="meta reveal"><div class="item"><div class="k">${cap}</div><div class="l" data-nl="${T[key+"_cap_nl"]}" data-en="${T[key+"_cap_en"]}">${T[key+"_cap_nl"]}</div></div><div class="item"><div class="k">100%</div><div class="l" data-nl="Elektrisch" data-en="Electric">Elektrisch</div></div><div class="item"><div class="k">★</div><div class="l" data-nl="Varend monument" data-en="Floating monument">Varend monument</div></div></div><ul class="feat reveal">${li}</ul><div class="strip reveal">${strips}</div></div></div></div>`;
}
const deck=document.getElementById('deck');
deck.innerHTML=slides.map(fn=>fn()).join("");
const slideEls=[...deck.querySelectorAll('.slide')];
const dotsWrap=document.getElementById('dots');
slideEls.forEach((_,i)=>{const b=document.createElement('button');b.onclick=()=>go(i);b.setAttribute('aria-label','Slide '+(i+1));dotsWrap.appendChild(b);});
const dotEls=[...dotsWrap.children];
document.getElementById('total').textContent=String(slideEls.length).padStart(2,'0');
let idx=0,lang='nl';
function go(n){if(n<0||n>=slideEls.length)return;slideEls[idx].classList.remove('active');idx=n;slideEls[idx].classList.add('active');dotEls.forEach((d,i)=>d.classList.toggle('on',i===idx));document.getElementById('cur').textContent=String(idx+1).padStart(2,'0');document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===slideEls.length-1;if(idx>0)document.getElementById('hint').classList.add('hide');}
function setLang(l){lang=l;document.documentElement.lang=l;document.getElementById('lang-nl').classList.toggle('on',l==='nl');document.getElementById('lang-en').classList.toggle('on',l==='en');document.querySelectorAll('[data-nl]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v!==null)el.textContent=v;});document.title=l==='nl'?"Private Canal Cruises — Presentatie":"Private Canal Cruises — Presentation";}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();go(idx+1);}if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(idx-1);}if(e.key==='Home')go(0);if(e.key==='End')go(slideEls.length-1);});
let x0=null,y0=null;
deck.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
deck.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){go(dx<0?idx+1:idx-1);}x0=null;y0=null;},{passive:true});
setLang('nl');go(0);

function getImageTargets(){
  const slide=slideEls[idx];
  const targets=[];
  // Background images on slide itself
  if(slide.style.backgroundImage){
    targets.push({el:slide,name:slide.style.backgroundImage.match(/url\(['"]?([^'"]+)['"]?\)/)?.[1]||'slide-bg',type:'slide'});
  }
  // All elements with background-image
  slide.querySelectorAll('[style*="background-image"]').forEach((el,i)=>{
    const bg=el.style.backgroundImage;
    const name=bg.match(/url\(['"]?([^'"]+)['"]?\)/)?.[1]||`element-${i}`;
    targets.push({el,name:name.split('/').pop(),type:el.className||'div'});
  });
  return targets;
}

function updateDevPanel(){
  if(!devMode)return;
  const targets=getImageTargets();
  const container=document.getElementById('devTargets');
  container.innerHTML=targets.map((t,i)=>`<div class="target${devTarget===t.el?' active':''}" onclick="selectDevTarget(${i})">${t.name}</div>`).join('');
  if(targets.length&&!devTarget)selectDevTarget(0);
}

function selectDevTarget(i){
  const targets=getImageTargets();
  if(!targets[i])return;
  devTarget=targets[i].el;
  document.getElementById('devImgName').textContent=targets[i].name;
  // Read current values
  const style=getComputedStyle(devTarget);
  const pos=style.backgroundPosition.split(' ');
  const posX=parseInt(pos[0])||50;
  const posY=parseInt(pos[1])||50;
  devPosX.value=posX;devPosY.value=posY;
  document.getElementById('devPosXVal').textContent=posX+'%';
  document.getElementById('devPosYVal').textContent=posY+'%';
  const size=style.backgroundSize;
  if(size==='cover'){devZoom.value=100;document.getElementById('devZoomVal').textContent='cover';}
  else{const z=parseInt(size)||100;devZoom.value=z;document.getElementById('devZoomVal').textContent=z+'%';}
  updateDevPanel();
}

devPosX.oninput=()=>{if(!devTarget)return;const v=devPosX.value;document.getElementById('devPosXVal').textContent=v+'%';devTarget.style.backgroundPosition=`${v}% ${devPosY.value}%`;};
devPosY.oninput=()=>{if(!devTarget)return;const v=devPosY.value;document.getElementById('devPosYVal').textContent=v+'%';devTarget.style.backgroundPosition=`${devPosX.value}% ${v}%`;};
devZoom.oninput=()=>{if(!devTarget)return;const v=devZoom.value;const txt=v==100?'cover':v+'%';document.getElementById('devZoomVal').textContent=txt;devTarget.style.backgroundSize=v==100?'cover':`${v}%`;};

function copyDevCSS(){
  if(!devTarget)return;
  const css=`background-position: ${devPosX.value}% ${devPosY.value}%; background-size: ${devZoom.value==100?'cover':devZoom.value+'%'};`;
  navigator.clipboard.writeText(css);
  alert('CSS gekopieerd:\\n'+css);
}

function copyAllCSS(){
  const targets=getImageTargets();
  if(!targets.length)return;
  const lines=targets.map(t=>{
    const s=getComputedStyle(t.el);
    const pos=t.el.style.backgroundPosition||s.backgroundPosition;
    const size=t.el.style.backgroundSize||s.backgroundSize;
    return `/* ${t.name} */\nbackground-position: ${pos}; background-size: ${size};`;
  });
  const all=lines.join('\n\n');
  navigator.clipboard.writeText(all);
  alert('Alle CSS gekopieerd:\\n\\n'+all);
}

document.addEventListener('keydown',e=>{
  if(e.key==='d'||e.key==='D'){
    devMode=!devMode;
    devPanel.classList.toggle('show',devMode);
    if(devMode)updateDevPanel();
  }
});

// Update dev panel on slide change
const origGo=go;
go=function(n){origGo(n);devTarget=null;if(devMode)setTimeout(updateDevPanel,100);};
</script>
